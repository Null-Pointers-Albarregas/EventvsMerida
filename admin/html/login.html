<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Iniciar Sesión - Eventvs Mérida</title>
    <link href="../css/styles.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../assets/img/logo-eventvs-merida.jpeg" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body class="bg-primary">
    <div id="layoutAuthentication">
        <div id="layoutAuthentication_content">
            <main>
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-5">
                            <div class="card shadow-lg border-0 rounded-lg mt-5">
                                <div class="card-header">
                                    <h3 class="text-center text-light font-weight-light my-4">Iniciar sesión</h3>
                                </div>
                                <div class="card-body">
                                    <form class="form-login needs-validation" novalidate>
                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="correo" type="email" required />
                                            <label for="correo">Correo electrónico</label>

                                            <div class="invalid-feedback">
                                                Por favor, rellena este campo.
                                            </div>
                                        </div>

                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="contrasenia" type="password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" required />
                                            <label for="contrasenia">Contraseña</label>

                                            <div class="invalid-feedback">
                                                La contraseña debe tener al menos 8 caracteres, una mayúscula, una minúscula y un número.
                                            </div>
                                        </div>
                                        <div
                                            class="text-center d-flex align-items-center justify-content-center mt-4 mb-0">
                                            <button class="btn btn-primary align-center w-50" id="btnLogin"
                                                type="submit">Iniciar sesión</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/scripts.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
