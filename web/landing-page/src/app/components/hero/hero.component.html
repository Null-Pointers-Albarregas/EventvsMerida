<section class="hero">
  <!-- Parallax background layer -->
  <div class="hero-bg" #parallaxBg>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
  </div>

  <!-- Floating particles -->
  <div class="particles">
    <span *ngFor="let p of [1,2,3,4,5,6,7,8]" class="particle" [class]="'p-' + p"></span>
  </div>

  <div class="hero-content">
    <div class="hero-label">
      <span class="label">Mérida · Extremadura · España</span>
    </div>

    <h1 class="hero-title">
      <span class="title-line line-1">Todos los</span>
      <span class="title-line line-2 gradient-text">Eventos</span>
      <span class="title-line line-3">de Mérida</span>
    </h1>

    <p class="hero-sub">
      Una sola app para descubrir la cultura, el ocio y los eventos<br>
      de la ciudad. Para residentes y viajeros.
    </p>

    <div class="hero-actions">
      <a href="https://github.com/Null-Pointers-Albarregas/EventvsMerida/releases/download/Alpha/eventvs-merida.apk" 
         target="_blank" 
         class="btn-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
          <path d="M16 16l-4 4-4-4h3V8h2v8h3z"/>
        </svg>
        Descargar Aplicación
      </a>
      <a href="https://github.com/Null-Pointers-Albarregas/EventvsMerida"
         target="_blank"
         class="btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Ver Repositorio
      </a>
    </div>

    <div class="hero-scroll-hint" (click)="scrollToAbout()">
      <span>Descubre más</span>
      <div class="scroll-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Logo centrado a la derecha -->
  <div class="hero-logo-wrap">
    <div class="logo-ring"></div>
    <img src="assets/logo.jpeg" alt="Eventvs Mérida" class="hero-logo" width="320" height="320" />
  </div>
</section>
